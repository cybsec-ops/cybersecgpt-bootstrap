name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build & dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Formatting check (black)
        run: black --check .

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy src || true

      - name: Validate pyproject (build)
        run: python -m build --sdist --wheel --outdir dist

      - name: Run tests
        run: pytest -q
